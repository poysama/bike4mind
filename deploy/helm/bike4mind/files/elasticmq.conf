# ElasticMQ config for the Bike4Mind self-host stack.
# Predeclares the SQS queues the app expects. Queue names match the last path
# segment of the *_QUEUE URLs in .env.selfhost.example.
#
# node-address below controls the queue-URL ElasticMQ returns
# (host/port/account); it matches the URLs the app reads from .env.selfhost
# (http://sqs:9324/000000000000/<name>).

include classpath("application.conf")

node-address {
  protocol = http
  host = "sqs"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

# Account id used in queue URLs (matches the .env.selfhost example URLs).
aws {
  region = "us-east-1"
  accountId = "000000000000"
}

queues {
  agentContinuationQueue { }
  agentProactiveMessageQueue { }
  deepAgentWakeQueue { }
  emailAnalysisQueue { }
  emailBatchQueue { }
  emailIngestionQueue { }
  emailJobQueue { }
  fabFileChunkQueue { }
  fabFileVectorizeQueue { }
  liveOpsTriageQueue { }
  notebookCurationQueue { }
  researchEngineQueue { }
  sreAnalysisQueue { }
  sreFixQueue { }
  tavernHeartbeatQueue { }
}
